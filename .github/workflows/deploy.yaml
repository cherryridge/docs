name: Deploy Site

permissions:
    pages: write

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v7.0.0
          - uses: actions/deploy-pages@v5.0.0
          - run: npm ci
          - run: npm run build
          - name: Deploy to GitHub Pages
            uses: actions/upload-pages-artifact@v5.0.0
            with:
                path: build

    deploy:
        runs-on: ubuntu-latest
        needs: build
        permissions:
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
          - name: Deploy to GitHub Pages
            id: deployment
            uses: actions/deploy-pages@v5.0.0